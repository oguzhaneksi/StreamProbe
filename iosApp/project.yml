name: iosApp
options:
  bundleIdPrefix: com.streamprobe
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

packages:
  StreamProbe:
    path: ..

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamprobe.iosApp
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 15.0
        INFOPLIST_FILE: iosApp/Resources/Info.plist
        DEVELOPMENT_TEAM: 9CL8652LHK
    dependencies:
      - package: StreamProbe
        product: StreamProbe

  iosAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iosAppTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamprobe.iosAppTests
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 15.0
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: iosApp

  iosAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iosAppUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamprobe.iosAppUITests
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 15.0
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: iosApp

schemes:
  iosApp:
    build:
      # Rebuild the local StreamProbeCore XCFramework BEFORE the build graph runs, so Kotlin
      # core changes (sdk/src/commonMain, iosMain) propagate to the app in the SAME build.
      # This must be a scheme build pre-action, NOT a target build-phase script: Xcode copies
      # the SPM binaryTarget (Package.swift -> sdk/build/XCFrameworks/debug/...) into the build
      # products before target phases run, so a build-phase rebuild lands one build late.
      # The heavy lifting lives in iosApp/scripts/rebuild-streamprobe-core.sh (guard + Gradle +
      # error-surfacing dialog) — keeping it out of the scheme's XML-encoded scriptText makes it
      # readable and testable. `settingsTarget` provides build settings to the action's env.
      preActions:
        - name: "Rebuild StreamProbeCore XCFramework (Gradle)"
          settingsTarget: iosApp
          script: |
            "$SRCROOT/scripts/rebuild-streamprobe-core.sh"
      targets:
        iosApp: all
    test:
      targets:
        - iosAppTests
        - iosAppUITests
    run:
      config: Debug
