name: iosApp
options:
  bundleIdPrefix: com.streamprobe
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

packages:
  StreamProbe:
    path: ..

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamprobe.iosApp
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 15.0
        INFOPLIST_FILE: iosApp/Resources/Info.plist
        DEVELOPMENT_TEAM: 9CL8652LHK
    dependencies:
      - package: StreamProbe
        product: StreamProbe

  iosAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iosAppTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamprobe.iosAppTests
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 15.0
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: iosApp

  iosAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iosAppUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamprobe.iosAppUITests
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 15.0
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: iosApp

schemes:
  iosApp:
    build:
      # Rebuild the local StreamProbeCore XCFramework BEFORE the build graph runs, so Kotlin
      # core changes (sdk/src/commonMain, iosMain) propagate to the app in the SAME build.
      # This must be a scheme build pre-action, NOT a target build-phase script: Xcode copies
      # the SPM binaryTarget (Package.swift -> sdk/build/XCFrameworks/debug/...) into the build
      # products before target phases run, so a build-phase rebuild lands one build late.
      # The guard makes the common case (no Kotlin change) instant: Gradle (≈15s of startup +
      # configuration even when up-to-date) only runs when a .kt under the iOS-relevant source
      # sets is newer than the STAMP, or the framework/stamp is missing. The stamp (not the
      # framework binary) is the reference because Gradle's up-to-date check is content-based:
      # a touched-but-unchanged .kt won't advance the framework's mtime, which would wedge an
      # mtime guard into rebuilding forever. Touching the stamp only on success advances it
      # every real run. `settingsTarget` makes $SRCROOT available to the script.
      preActions:
        - name: "Rebuild StreamProbeCore XCFramework (Gradle)"
          settingsTarget: iosApp
          script: |
            cd "$SRCROOT/.."
            XCF="sdk/build/XCFrameworks/debug/StreamProbeCore.xcframework/ios-arm64_x86_64-simulator/StreamProbeCore.framework/StreamProbeCore"
            STAMP="sdk/build/.streamprobe-xcf.stamp"
            if [ ! -f "$XCF" ] || [ ! -f "$STAMP" ] || [ -n "$(find sdk/src/commonMain sdk/src/iosMain -name '*.kt' -newer "$STAMP" 2>/dev/null | head -1)" ]; then
              echo "StreamProbeCore: Kotlin changed (or framework missing) -> rebuilding debug XCFramework…"
              ./gradlew :sdk:assembleStreamProbeCoreDebugXCFramework && mkdir -p "$(dirname "$STAMP")" && touch "$STAMP"
            else
              echo "StreamProbeCore: debug XCFramework up-to-date -> skipping Gradle."
            fi
      targets:
        iosApp: all
    test:
      targets:
        - iosAppTests
        - iosAppUITests
    run:
      config: Debug
