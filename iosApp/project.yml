name: iosApp
options:
  bundleIdPrefix: com.streamprobe
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

packages:
  StreamProbe:
    path: ..

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamprobe.iosApp
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 15.0
        INFOPLIST_FILE: iosApp/Resources/Info.plist
    dependencies:
      - package: StreamProbe
        product: StreamProbe

  iosAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iosAppTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamprobe.iosAppTests
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 15.0
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: iosApp

  iosAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iosAppUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamprobe.iosAppUITests
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 15.0
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: iosApp

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    test:
      targets:
        - iosAppTests
        - iosAppUITests
    run:
      config: Debug
