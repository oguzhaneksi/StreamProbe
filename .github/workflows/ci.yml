name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-checks:
    name: Android Build, Unit Tests & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build SDK (androidMain) + demo APK
        run: ./gradlew :sdk:assembleAndroidMain :app:assembleDebug --no-daemon

      - name: Unit Tests (Robolectric host tests)
        run: ./gradlew :sdk:testAndroidHostTest --no-daemon

      - name: Android Lint
        run: ./gradlew :sdk:lint --no-daemon

      - name: Ktlint (commonMain + androidMain + iosMain)
        run: ./gradlew :sdk:ktlintCheck --no-daemon

      - name: Detekt (androidMain + androidHostTest + commonMain metadata)
        run: ./gradlew :sdk:detektAndroidMain :sdk:detektAndroidHostTest :sdk:detektMetadataMain --no-daemon

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/detekt/
            **/build/reports/tests/
          retention-days: 14

  ios-checks:
    name: iOS Unit Tests & XCFramework
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: iOS Unit Tests (iosSimulatorArm64)
        run: ./gradlew :sdk:iosSimulatorArm64Test --no-daemon

      - name: Build iOS Debug XCFramework
        run: ./gradlew :sdk:assembleStreamProbeCoreDebugXCFramework --no-daemon

      - name: Verify Package.swift parses
        run: STREAMPROBE_LOCAL=1 swift package dump-package > /dev/null

      - name: Upload iOS Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-reports
          path: '**/build/reports/tests/'
          retention-days: 14

  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          script: ./gradlew connectedAndroidTest --no-daemon

      - name: Upload Instrumented Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports
          path: '**/build/reports/androidTests/'
          retention-days: 14
