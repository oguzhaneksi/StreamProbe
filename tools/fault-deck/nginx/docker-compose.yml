# Docker nginx that serves the fault-deck ladder.
#
#   docker compose up -d      # start (run-card.sh does this for you)
#   docker compose down       # stop
#
# Serves tools/fault-deck/content/ read-only on host port 8080. The four
# profiles live in conf.d/fault-deck.conf. Run make-ladder.sh first so
# ../content exists.

services:
  fault-deck:
    image: nginx:1.27-alpine
    container_name: streamprobe-fault-deck
    ports:
      - "8080:8080"
    volumes:
      # Our server config replaces nginx's stock default.conf.
      - ./conf.d/fault-deck.conf:/etc/nginx/conf.d/default.conf:ro
      # The ladder produced by make-ladder.sh.
      - ../content:/content:ro
    restart: unless-stopped
