# fault-deck.conf
#
# One nginx server that exposes the SAME ladder (mounted at /content) under four
# path prefixes. Each prefix is a "profile" the cards select from. The server
# stays up for all profiles at once; a card just picks which URL path the app
# loads. No restart between cards.
#
#   /full/      tam ladder, served as-is (master.m3u8 = 240p..2160p)
#   /cap480/    master trimmed to 480p (1080p/2160p never advertised)
#   /throttle/  byte-rate capped so ABR drops a rung but does not stall
#   /cdnmiss/   every response carries fake X-Cache: MISS / CF-Cache-Status: MISS
#
# Reachable from the Android emulator at http://10.0.2.2:8080/<profile>/master.m3u8

server {
    listen 8080;
    server_name localhost;

    # HLS MIME types (alpine nginx knows these, but be explicit).
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
    }
    default_type application/octet-stream;

    # Optional: lets a web player hit this too. Harmless for ExoPlayer.
    add_header Access-Control-Allow-Origin "*" always;

    # ---- full: tam ladder ----------------------------------------------------
    location /full/ {
        alias /content/;
    }

    # ---- cap480: master.m3u8 that only lists up to 480p ----------------------
    # The master is swapped for the trimmed one. Variant playlists and segments
    # still resolve to the same files, so 240p/480p play normally; 1080p/2160p
    # simply do not appear in the manifest.
    location = /cap480/master.m3u8 {
        alias /content/master-cap480.m3u8;
        add_header Access-Control-Allow-Origin "*" always;
    }
    location /cap480/ {
        alias /content/;
    }

    # ---- throttle: byte-rate cap --------------------------------------------
    # limit_rate is BYTES/sec per connection. The goal: ABR cannot hold the top
    # rung, drops one or two rungs, but the video keeps playing (no stall).
    #
    # TUNE THIS TO YOUR LADDER. Rough math with default ABR bandwidthFraction
    # (~0.7): usable bitrate ~= 0.7 * (limit_rate in bits). With this ladder
    # (1080p HEVC peak ~8.5 Mbps, 720p ~3 Mbps, 480p ~1.2 Mbps):
    #   640k bytes/s ~= 5.1 Mbps link -> ~3.6 Mbps usable -> settles around 720p.
    # Lower it (e.g. 300k ~= 2.4 Mbps) to push down to 480p; raise it to allow
    # 1080p again. If you re-encode the ladder at different bitrates, redo this.
    location /throttle/ {
        alias /content/;
        limit_rate 640k;
    }

    # ---- cdnmiss: fake cache-miss headers on every response ------------------
    location /cdnmiss/ {
        alias /content/;
        add_header X-Cache         "MISS" always;
        add_header CF-Cache-Status "MISS" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
}
